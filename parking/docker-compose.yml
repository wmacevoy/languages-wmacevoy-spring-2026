version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parking_user
      POSTGRES_PASSWORD: parking_pass
      POSTGRES_DB: parking
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

  app:
    build: ./server
    environment:
      DATABASE_URL: postgres://parking_user:parking_pass@db:5432/parking
      PORT: 3000
    depends_on:
      - db
    ports:
      - "3000:3000"

volumes:
  pgdata:
